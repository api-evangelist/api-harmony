aid: api-harmony
name: API Harmony
description: >-
  API Harmony was an API discovery and recommendation tool from IBM Research
  that used graph-based search, machine learning, and cognitive technologies to
  help developers find, compare, and select compatible APIs. It was offered as a
  cloud service on IBM Bluemix and has since been discontinued.
type: Index
