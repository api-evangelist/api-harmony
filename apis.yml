aid: api-harmony
name: API Harmony
description: >-
  API Harmony was an API discovery and recommendation tool from IBM Research
  that used graph-based search, machine learning, and cognitive technologies to
  help developers find, compare, and select compatible APIs. It was offered as a
  cloud service on IBM Bluemix and has since been discontinued.
type: Index
image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
tags:
  - API Aggregation
  - API Discovery
  - API Recommendation
  - Graph Technology
  - IBM
  - Machine Learning
url: >-
  https://raw.githubusercontent.com/api-evangelist/api-harmony/refs/heads/main/apis.yml
created: '2026-03-26'
modified: '2026-04-19'
specificationVersion: '0.19'
apis:
  - aid: api-harmony:api-harmony-service
    name: API Harmony Service
    description: >-
      API Harmony was an intelligent API matchmaking service that used graph
      technology and machine learning to search public APIs, reveal
      relationships between them, make recommendations, and identify gaps. It
      anticipated what developers would need to build applications and suggested
      optimal API combinations. The service has been discontinued.
    humanURL: https://developer.ibm.com/api/view/apiharmony-prod:apih-product:title-API_Harmony
    tags:
      - API Discovery
      - API Recommendation
      - Discontinued
      - Graph Search
      - Machine Learning
    properties:
      - type: Documentation
        url: https://developer.ibm.com/api/view/apiharmony-prod:apih-product:title-API_Harmony
      - type: Website
        url: https://apiharmony-open.mybluemix.net/public
common:
  - type: VulnerabilityDisclosure
    url: security/api-harmony-vulnerability-disclosure.yml
  - type: DomainSecurity
    url: security/api-harmony-domain-security.yml
  - type: Website
    url: https://developer.ibm.com/apiharmony/
