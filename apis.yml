apis:
  - aid: api-harmony:api-harmony-service
    name: API Harmony Service
    description: >-
      API Harmony was an intelligent API matchmaking service that used graph
      technology and machine learning to search public APIs, reveal
      relationships between them, make recommendations, and identify gaps. It
      anticipated what developers would need to build applications and suggested
      optimal API combinations. The service has been discontinued.
    humanURL: https://developer.ibm.com/api/view/apiharmony-prod:apih-product:title-API_Harmony
